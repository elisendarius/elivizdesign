<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Storytelling Visuals - eliViz Design</title>
  <meta name="description" content="Collection of storytelling with data visuals by eliViz Design.">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="logo-group">
      <div class="logo">eli<span>Viz</span> Design</div>
      <a class="home-icon-link" href="index.html" aria-label="Home">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M12 3.5 3.5 10v10.5h6.2v-6.6h4.6v6.6h6.2V10L12 3.5z"></path>
        </svg>
      </a>
    </div>
    <nav>
      <a href="index.html#services">Services</a>
      <a href="index.html#contact">Contact</a>
    </nav>
  </header>

  <section class="collection-banner collection-shell">
    <img src="images/eli_run_linkedin2.png" alt="Eli running banner">
  </section>

  <main class="collection-main">
    <section class="collection-section collection-shell">
      <div class="collection-intro">
        <div class="section-label">Selected work</div>
        <h2 class="section-title">Visual Collection</h2>
      </div>
      <div class="collection-grid">
        <figure class="collection-card">
          <img class="zoomable-image" src="images/red_project.png" alt="Storytelling visual 1">
          <figcaption>Narrative figure for report storytelling</figcaption>
        </figure>
        <figure class="collection-card">
          <img class="zoomable-image" src="images/methane_swe.png" alt="Methane map for Sweden">
          <figcaption>Methane-focused visual for regional storytelling</figcaption>
        </figure>
        <figure class="collection-card">
          <img class="zoomable-image" src="images/index_traits_records.png" alt="Methane map for Sweden">
          <figcaption>Map of claw health disorders included in the genetic evaluation for claw health in NAV</figcaption>
        </figure>
        <figure class="collection-card">
          <img class="zoomable-image" src="images/claw_diagnosis.png" alt="Methane map for Sweden">
        <figcaption>Map of claw health disorders included in the Nordic genetic evaluation for claw health</figcaption>
        </figure>
        <figure class="collection-card">
          <img class="zoomable-image" src="images/claw_work.png" alt="Methane map for Sweden">
        <figcaption>Trimming records included in the Nordic genetic evaluation for claw health </figcaption>
        </figure>
         <figure class="collection-card">
         <img class="zoomable-image" src="images/claw_work_colour.png" alt="Methane map for Sweden">
        <figcaption>Trimming records included in the Nordic genetic evaluation for claw health, in colour</figcaption>
        </figure>
        <figure class="collection-card">
         <img class="zoomable-image" src="images/NMT_infographic.jpg" alt="Methane map for Sweden">
        <figcaption>Timeline infographic</figcaption>
        </figure>
      </div>
      <div class="collection-footer-actions">
        <a class="btn-outline" href="index.html#services">Back to main page</a>
      </div>
    </section>
  </main>

  <footer>&copy; 2026 eliViz Design. All rights reserved.</footer>
  <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
    <img id="lightbox-img" src="" alt="Expanded image">
  </div>
  <script src="script.js"></script>
</body>
</html>
